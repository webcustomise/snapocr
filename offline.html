<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapOCR - Offline</title>
    <style>
        body { background-color: #0b1d4d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 10px; }
        p { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Connection Lost</h1>
    <p>Please connect to the internet to use SnapOCR.</p>
    <button onclick="window.location.reload()" style="margin-top:20px; padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:5px;">Retry</button>
</body>
</html>
