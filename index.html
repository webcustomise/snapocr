<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Terminated</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 24px;
            color: #ff4d4d;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #ff4d4d;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:hover {
            background-color: #e60000;
        }

        /* Larger screens */
        @media (min-width: 768px) {
            h1 {
                font-size: 28px;
            }
            p {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Developer Terminated Access</h1>
        <p>Your access to this application has been revoked. Please contact the administrator if you believe this is an error.</p>
        <button class="btn" onclick="location.reload()">Refresh</button>
    </div>

</body>
</html>
